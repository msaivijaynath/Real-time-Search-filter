<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time search filter to instantly find and filter items as you type.">
    <title>Real-Time Search Filter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background animated blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>SearchFlow</h1>
            </div>
            <p class="tagline">Find anything, instantly.</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Type to search products..."
                    autocomplete="off"
                >
                <button id="clearBtn" class="clear-btn" title="Clear search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="search-meta">
                <span id="resultCount" class="result-count">Showing all items</span>
                <div id="categoryFilters" class="category-filters">
                    <!-- Category pills will be rendered by JS -->
                </div>
            </div>
        </div>

        <!-- Cards Grid -->
        <div id="cardsGrid" class="cards-grid">
            <!-- Cards will be rendered by JS -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon">🔍</div>
            <h2>No results found</h2>
            <p>Try a different search term or clear the filter.</p>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
